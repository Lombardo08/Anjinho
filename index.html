<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <title>Para Meu Amor ❤️</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>

<header>
  <h1>Feliz aniversário meu Anjinho</h1>
  <p>Espero que vc goste desta pequena lembrança</p>
</header>

<nav>
  <button onclick="mostrar('inicio')">Começo</button>
  <button onclick="mostrar('mensagens')">Historias</button>
  <button onclick="mostrar('tarefas')">Direitos</button>
</nav>

<section id="inicio" class="aba ativa">
  <h2>Oi amor 💕</h2>
  <p>Você é a melhor coisa da minha vida ❤️</p>
</section>

<section id="mensagens" class="aba">
  <div class="card">Eu te amo muito 💖</div>
  <div class="card">Você me faz feliz todos os dias ❤️</div>
</section>

<section id="tarefas" class="aba">
  <h2>Coisas pra gente fazer 💑</h2>

  <input type="text" id="tarefa" placeholder="Ex: ver filme juntos">
  <button onclick="add()">Adicionar</button>

  <ul id="lista"></ul>
</section>

<script>
function mostrar(id) {
  document.querySelectorAll('.aba').forEach(el => el.classList.remove('ativa'));
  document.getElementById(id).classList.add('ativa');
}

function add() {
  let input = document.getElementById("tarefa");

  if(input.value === "") return;

  let li = document.createElement("li");
  li.textContent = input.value;

  document.getElementById("lista").appendChild(li);

  input.value = "";
}
</script>

</body>
</html>
