<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Para Meu Amor ❤️</title>

<style>
/* RESET */
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}

body {
  font-family: Arial, sans-serif;
  background: white;
}

/* HEADER */
header {
  background: linear-gradient(135deg, #d4af37, #f5e6a8);
  text-align: center;
  padding: 30px 15px;
  color: white;
}

/* MENU */
nav {
  display: flex;
  justify-content: center;
  flex-wrap: wrap;
  gap: 10px;
  padding: 15px;
}

nav button {
  padding: 12px 18px;
  border-radius: 25px;
  border: 2px solid #d4af37;
  background: white;
  color: #d4af37;
  font-weight: bold;
  cursor: pointer;
}

#btnSim {
  opacity: 0.6;
}

/* ABAS */
.aba {
  display: none;
  padding: 25px;
  text-align: center;
  min-height: 70vh;
}

.ativa {
  display: block;
}

/* CORES */
#inicio { background: #ffffff; }
#mensagens { background: #ffe4ec; }
#momentos { background: #f3e8ff; }
#jogo { background: #e8ffe8; }
#tarefas { background: #ffd6e0; }

/* TEXTO */
.texto {
  max-width: 600px;
  margin: 20px auto;
  font-size: 18px;
}

/* CARROSSEL */
.carrossel img {
  width: 260px;
  max-width: 90%;
  border-radius: 20px;
  margin-top: 20px;
}

/* VIDEO */
video {
  width: 320px;
  max-width: 90%;
  border-radius: 20px;
  margin-top: 20px;
}

/* QUIZ */
#jogo button {
  margin: 10px;
  padding: 12px;
  border-radius: 10px;
  border: none;
  background: #ff6f91;
  color: white;
}

/* INPUT */
input {
  padding: 10px;
  border-radius: 10px;
  border: 1px solid #ccc;
}

/* LISTA */
li {
  background: white;
  margin: 5px auto;
  padding: 10px;
  border-radius: 10px;
  max-width: 300px;
}

/* RESPONSIVO */
@media (max-width: 600px) {
  nav {
    flex-direction: column;
    align-items: center;
  }

  nav button {
    width: 90%;
  }
}
</style>

</head>

<body>

<header>
  <h1>Feliz Aniversário meu ANJINHO !</h1>
  <p>Espero que voce goste dessa Lembrança</p>

  <h2>Pra você minha NAMOLADA</h2>
  <p>Minha forma de desmonstrar como eu te amo</p>
</header>

<nav>
  <button onclick="mostrar('inicio')">Início</button>
  <button onclick="mostrar('mensagens')">Mensagens</button>
  <button onclick="mostrar('momentos')">Momentos</button>
  <button onclick="mostrar('jogo')">Quiz 💖</button>
  <button id="btnSim" onclick="abrirSim()">🔒 SIM 💖</button>
</nav>

<!-- INICIO -->
<section id="inicio" class="aba ativa">
  <h2>Nosso início 💖</h2>
  <p>Foi aqui que tudo começou...</p>

  <div class="carrossel">
    <img id="slide" src="foto1.jpg">
  </div>
</section>

<!-- MENSAGEM -->
<section id="mensagens" class="aba">
  <h2>💌 Uma mensagem pra você</h2>

  <p class="texto">
    Escreva aqui sua mensagem ❤️
  </p>
</section>

<!-- MOMENTOS -->
<section id="momentos" class="aba">
  <h2>Nossos momentos 📸</h2>

  <video controls autoplay muted loop>
    <source src="video.mp4" type="video/mp4">
  </video>
</section>

<!-- QUIZ -->
<section id="jogo" class="aba">
  <h2>Quiz sobre nós 😏</h2>

  <p>Pontuação: <span id="pontos">0</span>/7</p>

  <p id="pergunta"></p>

  <button onclick="responder(0)" id="btn1"></button>
  <button onclick="responder(1)" id="btn2"></button>

  <p id="resultado"></p>
</section>

<!-- SIM -->
<section id="tarefas" class="aba">
  <h2>SIM 💖</h2>

  <input type="text" id="tarefa" placeholder="Digite algo aqui...">
  <button onclick="add()">Adicionar</button>

  <ul id="lista"></ul>
</section>

<script>
// ABAS
function mostrar(id) {
  document.querySelectorAll('.aba').forEach(el => el.classList.remove('ativa'));
  document.getElementById(id).classList.add('ativa');
}

// CARROSSEL
const fotos = [
  "foto1.jpg","foto2.jpg","foto3.jpg","foto4.jpg","foto5.jpg",
  "foto6.jpg","foto7.jpg","foto8.jpg","foto9.jpg","foto10.jpg"
];

let i = 0;

setInterval(() => {
  i = (i + 1) % fotos.length;
  document.getElementById("slide").src = fotos[i];
}, 2000);

// QUIZ + PONTUAÇÃO
const quiz = [
  { pergunta: "Quem ama mais?", opcoes: ["Você", "Eu"], correta: 0 },
  { pergunta: "Quem é mais lindo?", opcoes: ["Você", "Eu"], correta: 0 },
  { pergunta: "Quem sente mais saudade?", opcoes: ["Você", "Eu"], correta: 0 },
  { pergunta: "Quem é mais grudado?", opcoes: ["Você", "Eu"], correta: 0 },
  { pergunta: "Quem é o amor da vida?", opcoes: ["Você", "Eu"], correta: 0 },
  { pergunta: "Quem pensa mais no outro?", opcoes: ["Você", "Eu"], correta: 0 },
  { pergunta: "Quem é mais apaixonado?", opcoes: ["Você", "Eu"], correta: 0 }
];

let atual = 0;
let pontos = 0;
let desbloqueado = false;

function carregarPergunta() {
  document.getElementById("pergunta").innerText = quiz[atual].pergunta;
  document.getElementById("btn1").innerText = quiz[atual].opcoes[0];
  document.getElementById("btn2").innerText = quiz[atual].opcoes[1];
}

function responder(escolha) {
  if(escolha === quiz[atual].correta) {
    pontos++;
    document.getElementById("resultado").innerText = "Acertou 😏💖";
  } else {
    document.getElementById("resultado").innerText = "Errou 😄";
  }

  document.getElementById("pontos").innerText = pontos;

  atual++;

  if(atual < quiz.length) {
    setTimeout(carregarPergunta, 1500);
  } else {
    setTimeout(() => {
      if(pontos >= 5) {
        desbloquearSim();
        document.getElementById("resultado").innerText = "Desbloqueado 💖";
      } else {
        document.getElementById("resultado").innerText = "Tente novamente 😄";
      }
    }, 1500);
  }
}

function desbloquearSim() {
  desbloqueado = true;
  const btn = document.getElementById("btnSim");
  btn.innerText = "SIM 💖";
  btn.style.opacity = "1";
  btn.style.background = "#ff6f91";
  btn.style.color = "white";
}

function abrirSim() {
  if(desbloqueado) {
    mostrar('tarefas');
  } else {
    alert("Acerte pelo menos 5 perguntas 😏");
  }
}

carregarPergunta();

// LISTA
function add() {
  let input = document.getElementById("tarefa");

  if(input.value === "") return;

  let li = document.createElement("li");
  li.textContent = input.value;

  document.getElementById("lista").appendChild(li);
  input.value = "";
}
</script>

</body>
</html>
