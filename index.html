<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Para Meu Amor ❤️</title>

<style>
* { margin:0; padding:0; box-sizing:border-box; }
body { font-family: Arial; }

/* HEADER */
header {
  background: linear-gradient(135deg, #d4af37, #f5e6a8);
  text-align:center;
  padding:20px;
  color:white;
}

/* MENU */
nav {
  display:flex;
  flex-wrap:wrap;
  justify-content:center;
  gap:10px;
  padding:10px;
}

nav button {
  padding:10px;
  border-radius:20px;
  border:2px solid #d4af37;
  background:white;
  color:#d4af37;
  font-weight:bold;
}

#btnSim { opacity:0.5; }

/* ABAS */
.aba { display:none; padding:20px; text-align:center; }
.ativa { display:block; }

/* CORES */
#mensagens { background:#ffe4ec; }
#momentos { background:#f3e8ff; }
#jogo { background:#e8ffe8; }
#tarefas { background:#ffd6e0; }

/* CARROSSEL */
.carrossel img {
  width:250px;
  border-radius:15px;
  margin-top:20px;
}

/* QUIZ */
#jogo button {
  margin:10px;
  padding:12px 20px;
  border-radius:10px;
  border:none;
  background:#ff6f91;
  color:white;
  font-size:16px;
  transition:0.3s;
}

#pergunta {
  font-size:22px;
  margin:15px;
  font-weight:bold;
}

#resultado {
  font-size:18px;
  margin-top:10px;
}

/* VIDEO */
video {
  width:300px;
  border-radius:15px;
}

/* LISTA */
#lista li {
  margin:8px auto;
  background:white;
  padding:10px;
  border-radius:10px;
  max-width:300px;
}

/* ANIMAÇÕES */
.fade { opacity:0; transition:0.4s; }

.acerto {
  background:#4CAF50 !important;
  transform:scale(1.1);
}

.erro {
  background:#ff4d4d !important;
  transform:scale(1.1);
}

.desbloqueado {
  animation: brilho 1s infinite alternate;
  background:#ff6f91 !important;
  color:white !important;
}

@keyframes brilho {
  from { box-shadow:0 0 5px #ff6f91; }
  to { box-shadow:0 0 20px #ff6f91; }
}
</style>
</head>

<body>

<header>
  <h1>Feliz Aniversário meu ANJINHO !</h1>
</header>

<nav>
  <button onclick="mostrar('inicio')">Início</button>
  <button onclick="mostrar('mensagens')">Mensagens</button>
  <button onclick="mostrar('momentos')">Momentos</button>
  <button onclick="mostrar('jogo')">Quiz 💖</button>
  <button id="btnSim" onclick="abrirSim()">🔒 SIM 💖</button>
</nav>

<section id="inicio" class="aba ativa">
  <h2>Nosso início 💖</h2>
  <div class="carrossel">
    <img id="slide" src="foto1.jpg">
  </div>
</section>

<section id="mensagens" class="aba">
  <p>Escreva aqui sua mensagem ❤️</p>
</section>

<section id="momentos" class="aba">
  <video controls>
    <source src="video.mp4">
  </video>
</section>

<section id="jogo" class="aba">
  <h2>Quiz 😏</h2>
  <p>Pontos: <span id="pontos">0</span>/7</p>

  <p id="pergunta"></p>

  <button onclick="responder(0)" id="btn1"></button>
  <button onclick="responder(1)" id="btn2"></button>

  <p id="resultado"></p>
</section>

<section id="tarefas" class="aba">
  <h2>SIM 💖</h2>

  <input type="text" id="tarefa" placeholder="Escreve algo aqui ❤️">
  <button onclick="add()">Adicionar</button>

  <ul id="lista"></ul>
</section>

<script>
// ABAS
function mostrar(id){
  document.querySelectorAll('.aba').forEach(e=>e.classList.remove('ativa'));
  document.getElementById(id).classList.add('ativa');
}

// CARROSSEL
const fotos = [
 "foto1.jpg","foto2.jpg","foto3.jpg","foto4.jpg","foto5.jpg",
 "foto6.jpg","foto7.jpg","foto8.jpg","foto9.jpg","foto10.jpg"
];

let i=0;
setInterval(()=>{
  i=(i+1)%fotos.length;
  slide.src=fotos[i];
},2000);

// QUIZ
const quiz = [
 { pergunta:"Quem ama mais?", opcoes:["Você","Eu"], correta:0 },
 { pergunta:"Quem é mais lindo?", opcoes:["Você","Eu"], correta:0 },
 { pergunta:"Quem sente mais saudade?", opcoes:["Você","Eu"], correta:1 },
 { pergunta:"Quem é mais grudado?", opcoes:["Você","Eu"], correta:0 },
 { pergunta:"Quem é o amor da vida?", opcoes:["Você","Eu"], correta:1 },
 { pergunta:"Quem pensa mais no outro?", opcoes:["Você","Eu"], correta:0 },
 { pergunta:"Quem é mais apaixonado?", opcoes:["Você","Eu"], correta:1 }
];

const mensagensErro = [
  "Errou 😄 mas eu ainda te amo 💖",
  "Hmm... tenta de novo 😏",
  "Quase 😄 você chega lá!",
  "Errou 😅 mas tá perdoada",
  "Não foi dessa vez 😏💖"
];

let atual=0;
let pontos=0;
let desbloqueado=false;

const perguntaEl = document.getElementById("pergunta");
const btn1 = document.getElementById("btn1");
const btn2 = document.getElementById("btn2");
const resultado = document.getElementById("resultado");
const pontosEl = document.getElementById("pontos");

// animação
function animarTroca(){
  perguntaEl.classList.add("fade");
  setTimeout(()=>perguntaEl.classList.remove("fade"),400);
}

function carregarPergunta(){
  let q = quiz[atual];

  animarTroca();
  perguntaEl.innerText = q.pergunta;

  if(Math.random()<0.5){
    btn1.innerText = q.opcoes[0];
    btn2.innerText = q.opcoes[1];
  } else {
    btn1.innerText = q.opcoes[1];
    btn2.innerText = q.opcoes[0];
  }

  resultado.innerText="";
}

function efeitoBotao(btn,tipo){
  btn.classList.add(tipo);
  setTimeout(()=>btn.classList.remove(tipo),500);
}

// RESPOSTA PELO TEXTO
function responder(escolha){
  let respostaEscolhida = escolha===0 ? btn1.innerText : btn2.innerText;
  let respostaCorreta = quiz[atual].opcoes[quiz[atual].correta];

  if(respostaEscolhida === respostaCorreta){
    pontos++;
    resultado.innerText="Acertou 😏💖";
    efeitoBotao(escolha===0?btn1:btn2,"acerto");
  } else {
    let msg = mensagensErro[Math.floor(Math.random()*mensagensErro.length)];
    resultado.innerText = msg;
    efeitoBotao(escolha===0?btn1:btn2,"erro");
  }

  pontosEl.innerText=pontos;
  atual++;

  if(atual<quiz.length){
    setTimeout(carregarPergunta,1200);
  } else {
    setTimeout(()=>{
      if(pontos===7){
        desbloquear();
        resultado.innerText="PERFEITA 💖 desbloqueado!";
      } else {
        resultado.innerText="Você precisa acertar todas 😏💖";
      }
    },1200);
  }
}

function desbloquear(){
  desbloqueado=true;
  btnSim.innerText="💖 SIM 💖";
  btnSim.classList.add("desbloqueado");
  btnSim.style.opacity="1";
}

function abrirSim(){
  if(desbloqueado){
    mostrar('tarefas');
  } else {
    alert("Acerte as 7 perguntas 😏💖");
  }
}

carregarPergunta();

// LISTA
let listaItens=[];

function add(){
  let input=document.getElementById("tarefa");

  if(input.value==="") return;

  if(listaItens.length>=5){
    alert("Só pode até 5 😏💖");
    return;
  }

  listaItens.push(input.value);
  atualizarLista();
  input.value="";
}

function atualizarLista(){
  let ul=document.getElementById("lista");
  ul.innerHTML="";

  listaItens.forEach(item=>{
    let li=document.createElement("li");
    li.textContent=item;
    ul.appendChild(li);
  });
}
</script>

</body>
</html>
