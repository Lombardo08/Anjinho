<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Para Meu Amor ❤️</title>

<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}

body {
  font-family: Arial;
}

/* HEADER */
header {
  background: linear-gradient(135deg, #d4af37, #f5e6a8);
  text-align: center;
  padding: 20px;
  color: white;
}

/* MENU */
nav {
  display: flex;
  flex-wrap: wrap;
  justify-content: center;
  gap: 10px;
  padding: 10px;
}

nav button {
  padding: 10px;
  border-radius: 20px;
  border: 2px solid #d4af37;
  background: white;
  color: #d4af37;
  font-weight: bold;
}

#btnSim {
  opacity: 0.5;
}

/* ABAS */
.aba {
  display: none;
  padding: 20px;
  text-align: center;
}

.ativa {
  display: block;
}

/* CORES */
#mensagens { background: #ffe4ec; }
#momentos { background: #f3e8ff; }
#jogo { background: #e8ffe8; }
#tarefas { background: #ffd6e0; }

/* CARROSSEL */
.carrossel img {
  width: 250px;
  border-radius: 15px;
  margin-top: 20px;
}

/* QUIZ */
#jogo button {
  margin: 10px;
  padding: 10px;
  border-radius: 10px;
  border: none;
  background: #ff6f91;
  color: white;
}

/* VIDEO */
video {
  width: 300px;
  border-radius: 15px;
}

/* ANIMAÇÃO */
.desbloqueado {
  animation: brilho 1s infinite alternate;
  background: #ff6f91 !important;
  color: white !important;
  transform: scale(1.1);
}

@keyframes brilho {
  from { box-shadow: 0 0 5px #ff6f91; }
  to { box-shadow: 0 0 20px #ff6f91; }
}
</style>

</head>

<body>

<header>
  <h1>Feliz Aniversário meu ANJINHO !</h1>
</header>

<nav>
  <button onclick="mostrar('inicio')">Início</button>
  <button onclick="mostrar('mensagens')">Mensagens</button>
  <button onclick="mostrar('momentos')">Momentos</button>
  <button onclick="mostrar('jogo')">Quiz 💖</button>
  <button id="btnSim" onclick="abrirSim()">🔒 SIM 💖</button>
</nav>

<!-- INICIO -->
<section id="inicio" class="aba ativa">
  <h2>Nosso início 💖</h2>
  <div class="carrossel">
    <img id="slide" src="foto1.jpg">
  </div>
</section>

<!-- MENSAGEM -->
<section id="mensagens" class="aba">
  <p>Escreva aqui sua mensagem ❤️</p>
</section>

<!-- MOMENTOS -->
<section id="momentos" class="aba">
  <video controls>
    <source src="video.mp4">
  </video>
</section>

<!-- QUIZ -->
<section id="jogo" class="aba">
  <h2>Quiz 😏</h2>

  <p>Pontos: <span id="pontos">0</span>/7</p>

  <p id="pergunta"></p>

  <button onclick="responder(0)" id="btn1"></button>
  <button onclick="responder(1)" id="btn2"></button>

  <p id="resultado"></p>
</section>

<!-- SIM -->
<section id="tarefas" class="aba">
  <h2>SIM 💖</h2>
</section>

<script>
// ABAS
function mostrar(id) {
  document.querySelectorAll('.aba').forEach(e => e.classList.remove('ativa'));
  document.getElementById(id).classList.add('ativa');
}

// CARROSSEL
const fotos = [
 "foto1.jpg","foto2.jpg","foto3.jpg","foto4.jpg","foto5.jpg",
 "foto6.jpg","foto7.jpg","foto8.jpg","foto9.jpg","foto10.jpg"
];

let i = 0;
setInterval(()=>{
  i = (i+1) % fotos.length;
  document.getElementById("slide").src = fotos[i];
},2000);

// QUIZ
const quiz = [
 { pergunta:"Quem ama mais?", opcoes:["Você","Eu"], correta:0 },
 { pergunta:"Quem é mais lindo?", opcoes:["Você","Eu"], correta:0 },
 { pergunta:"Quem sente mais saudade?", opcoes:["Você","Eu"], correta:0 },
 { pergunta:"Quem é mais grudado?", opcoes:["Você","Eu"], correta:0 },
 { pergunta:"Quem é o amor da vida?", opcoes:["Você","Eu"], correta:0 },
 { pergunta:"Quem pensa mais no outro?", opcoes:["Você","Eu"], correta:0 },
 { pergunta:"Quem é mais apaixonado?", opcoes:["Você","Eu"], correta:0 }
];

let atual = 0;
let pontos = 0;
let desbloqueado = false;
let corretaAtual = 0;

function carregarPergunta(){
  let q = quiz[atual];
  document.getElementById("pergunta").innerText = q.pergunta;

  corretaAtual = Math.floor(Math.random()*2);

  if(corretaAtual === 0){
    btn1.innerText = q.opcoes[q.correta];
    btn2.innerText = q.opcoes[1 - q.correta];
  } else {
    btn1.innerText = q.opcoes[1 - q.correta];
    btn2.innerText = q.opcoes[q.correta];
  }
}

function responder(escolha){
  if(escolha === corretaAtual){
    pontos++;
    resultado.innerText = "Acertou 😏";
  } else {
    resultado.innerText = "Errou 😄";
  }

  pontosEl.innerText = pontos;

  atual++;

  if(atual < quiz.length){
    setTimeout(carregarPergunta,1000);
  } else {
    if(pontos >= 5){
      desbloquear();
      resultado.innerText = "Desbloqueado 💖";
    } else {
      resultado.innerText = "Tente novamente 😄";
    }
  }
}

function desbloquear(){
  desbloqueado = true;
  btnSim.innerText = "💖 SIM 💖";
  btnSim.classList.add("desbloqueado");
  btnSim.style.opacity = "1";
}

function abrirSim(){
  if(desbloqueado){
    mostrar('tarefas');
  } else {
    alert("Acerte 5 perguntas 😏");
  }
}

carregarPergunta();
</script>

</body>
</html>
